<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <style>
        table {
            border-collapse: collapse;
            margin-top: 20px;
        }
        td {
            width: 70px;
            height: 70px;
            text-align: center;
            font-size: 30px;
            border: 2px solid black;
        }
        a {
            text-decoration: none;
            color: black;
            display: block;
            width: 100%;
            height: 100%;
            line-height: 70px;
        }
    </style>
</head>
<body>

<h2>Tic Tac Toe Game</h2>

<table>
    {% for i in range(3) %}
    <tr>
        {% for j in range(3) %}
        <td>
            <a href="/move/{{ i*3 + j }}">
                {{ board[i*3 + j] }}
            </a>
        </td>
        {% endfor %}
    </tr>
    {% endfor %}
</table>

<br>
<a href="/reset">Restart Game</a>

</body>
</html>
